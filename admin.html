<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0c1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Анимированный фон как на главной */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(76, 40, 140, 0.4) 0%, rgba(15, 12, 31, 1) 70%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            text-align: center;
            color: transparent;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ff6b6b);
            background-clip: text;
            -webkit-background-clip: text;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            to { text-shadow: 0 0 40px rgba(255, 140, 0, 0.6); }
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 0.95em;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            font-size: 1em;
            color: white;
            transition: all 0.3s ease;
            outline: none;
        }
        
        input:focus {
            border-color: rgba(255, 215, 0, 0.5);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 140, 0, 0.2));
            color: white;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
            margin-top: 20px;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:hover {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-color: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 30px rgba(255, 215, 0, 0.3);
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 20px;
            display: none;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 30px;
            border: 1px solid rgba(255, 107, 107, 0.3);
            font-size: 0.95em;
        }
        
        /* Плавающие частицы как на главной */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite;
            z-index: 0;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-30px) translateX(20px); opacity: 0.1; }
        }
        
        /* Кнопка назад */
        .back-link {
            text-align: center;
            margin-top: 25px;
        }
        
        .back-link a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .back-link a:hover {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        /* Адаптивность */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            input {
                padding: 12px 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Плавающие частицы для фона -->
    <div class="particle" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="top: 70%; left: 80%; animation-delay: 1s;"></div>
    <div class="particle" style="top: 40%; left: 90%; animation-delay: 2s;"></div>
    <div class="particle" style="top: 80%; left: 20%; animation-delay: 3s;"></div>
    <div class="particle" style="top: 30%; left: 70%; animation-delay: 4s;"></div>
    
    <div class="login-container">
        <h1>🔐 Админ-панель</h1>
        
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="username" placeholder="Введите логин">
        </div>
        
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль">
        </div>
        
        <button onclick="login()">Войти</button>
        
        <div class="error" id="errorMessage">Неверный логин или пароль</div>
        
        <div class="back-link">
            <a href="index.html">← Вернуться на главную</a>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Проверка логина и пароля (ваши данные)
            if (username === 'DsAyu1718' && password === 'g@k72%₽0htBaTla') {
                // Сохраняем сессию
                sessionStorage.setItem('admin_logged', 'true');
                // Переходим в панель управления
                window.location.href = 'admin-panel.html';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                // Скрываем сообщение через 3 секунды
                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 3000);
            }
        }
        
        // Добавляем возможность входа по Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
