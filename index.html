<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0c1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Анимированный фон */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(76, 40, 140, 0.4) 0%, rgba(15, 12, 31, 1) 70%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Стеклянный контейнер */
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 35px 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Заголовок с градиентом */
        h1 {
            text-align: center;
            color: transparent;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ff6b6b);
            background-clip: text;
            -webkit-background-clip: text;
            font-size: 4em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            position: relative;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            to { text-shadow: 0 0 40px rgba(255, 140, 0, 0.6); }
        }
        
        /* Подзаголовок */
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 35px;
            font-size: 1.2em;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 300;
            position: relative;
        }
        
        .subtitle::before,
        .subtitle::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
        }
        
        .subtitle::before {
            left: 15%;
        }
        
        .subtitle::after {
            right: 15%;
        }
        
        /* Контейнер кнопок */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }
        
        /* Стилизация кнопок */
        .menu-button {
            display: block;
            width: 100%;
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            text-decoration: none;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }
        
        /* Градиентный фон при наведении */
        .menu-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .menu-button:hover::before {
            left: 100%;
        }
        
        /* Индивидуальные цвета для каждой кнопки */
        .menu-button:nth-child(1) {
            background: linear-gradient(135deg, rgba(0, 100, 255, 0.2), rgba(0, 200, 255, 0.2));
            border-color: rgba(0, 200, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.2);
        }
        
        .menu-button:nth-child(1):hover {
            background: linear-gradient(135deg, #0066ff, #00ccff);
            border-color: white;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0, 150, 255, 0.4);
        }
        
        .menu-button:nth-child(2) {
            background: linear-gradient(135deg, rgba(255, 100, 0, 0.2), rgba(255, 150, 0, 0.2));
            border-color: rgba(255, 150, 0, 0.3);
            box-shadow: 0 5px 15px rgba(255, 100, 0, 0.2);
        }
        
        .menu-button:nth-child(2):hover {
            background: linear-gradient(135deg, #ff6600, #ffaa00);
            border-color: white;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(255, 100, 0, 0.4);
        }
        
        .menu-button:nth-child(3) {
            background: linear-gradient(135deg, rgba(255, 0, 150, 0.2), rgba(255, 50, 100, 0.2));
            border-color: rgba(255, 50, 100, 0.3);
            box-shadow: 0 5px 15px rgba(255, 0, 150, 0.2);
        }
        
        .menu-button:nth-child(3):hover {
            background: linear-gradient(135deg, #ff0099, #ff3366);
            border-color: white;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(255, 0, 150, 0.4);
        }
        
        .menu-button:nth-child(4) {
            background: linear-gradient(135deg, rgba(150, 0, 255, 0.2), rgba(200, 0, 255, 0.2));
            border-color: rgba(200, 0, 255, 0.3);
            box-shadow: 0 5px 15px rgba(150, 0, 255, 0.2);
        }
        
        .menu-button:nth-child(4):hover {
            background: linear-gradient(135deg, #9600ff, #c000ff);
            border-color: white;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(150, 0, 255, 0.4);
        }
        
        .menu-button:nth-child(5) {
            background: linear-gradient(135deg, rgba(0, 255, 150, 0.2), rgba(50, 255, 100, 0.2));
            border-color: rgba(50, 255, 100, 0.3);
            box-shadow: 0 5px 15px rgba(0, 255, 150, 0.2);
        }
        
        .menu-button:nth-child(5):hover {
            background: linear-gradient(135deg, #00ff99, #33ff66);
            border-color: white;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0, 255, 150, 0.4);
        }
        
        /* Эмодзи в кнопках */
        .menu-button span {
            margin-right: 10px;
            font-size: 1.3em;
            filter: drop-shadow(0 0 5px currentColor);
        }
        
        /* Футер со ссылкой на админку */
        .admin-link {
            margin-top: 30px;
            text-align: center;
            position: relative;
            padding-top: 20px;
        }
        
        .admin-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 30%;
            width: 40%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        }
        
        .admin-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.95em;
            letter-spacing: 1px;
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: inline-block;
            backdrop-filter: blur(5px);
        }
        
        .admin-link a:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        /* Плавающие частицы */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite;
            z-index: 0;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-30px) translateX(20px); opacity: 0.1; }
        }
        
        /* Адаптивность */
        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
            }
            
            h1 {
                font-size: 3em;
            }
            
            .subtitle {
                font-size: 1em;
            }
            
            .subtitle::before,
            .subtitle::after {
                width: 15px;
            }
            
            .menu-button {
                padding: 16px 20px;
                font-size: 1.1em;
            }
        }
        
        /* Добавляем немного магии при загрузке */
        .menu-button {
            animation: slideIn 0.5s ease backwards;
        }
        
        .menu-button:nth-child(1) { animation-delay: 0.1s; }
        .menu-button:nth-child(2) { animation-delay: 0.2s; }
        .menu-button:nth-child(3) { animation-delay: 0.3s; }
        .menu-button:nth-child(4) { animation-delay: 0.4s; }
        .menu-button:nth-child(5) { animation-delay: 0.5s; }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <!-- Плавающие частицы для фона -->
    <div class="particle" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="top: 70%; left: 80%; animation-delay: 1s;"></div>
    <div class="particle" style="top: 40%; left: 90%; animation-delay: 2s;"></div>
    <div class="particle" style="top: 80%; left: 20%; animation-delay: 3s;"></div>
    <div class="particle" style="top: 30%; left: 70%; animation-delay: 4s;"></div>
    
    <div class="container">
        <h1>Каталог</h1>
        <div class="subtitle">Нажмите на раздел для перехода</div>
        
        <div class="menu-buttons">
            <a href="zhidkosti.html" class="menu-button"><span>💧</span> Жидкости</a>
            <a href="rashodniki.html" class="menu-button"><span>🔧</span> Расходники</a>
            <a href="odnorazki.html" class="menu-button"><span>⚡</span> Одноразки</a>
            <a href="pod-sistemy.html" class="menu-button"><span>📱</span> POD системы</a>
            <a href="snus.html" class="menu-button"><span>🍃</span> Снюс</a>
        </div>
        
        <div class="admin-link">
            <a href="admin.html">🔐 Вход в админ панель</a>
        </div>
    </div>
</body>
</html>
